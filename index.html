<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dandi Setio Wibowo — Profile & Portofolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Variabel Warna Tema Gelap */
        :root {
            --bg: #0b0f14; 
            --bg-card: rgba(17, 22, 32, 0.6); 
            --border: rgba(42, 52, 72, 0.8);
            --text-main: #f8fafc; 
            --text-muted: #8fa3c0;
            --blue: #38bdf8; 
            --purple: #a855f7; 
            --emerald: #10b981;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Efek cahaya ambient di latar belakang */
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(56, 189, 248, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(168, 85, 247, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            z-index: 1;
        }

        /* Foto Profil Animasi Glow */
        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1.2rem;
            padding: 4px;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.2);
            transition: transform 0.4s ease;
        }
        .profile-img:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 40px rgba(168, 85, 247, 0.3);
        }

        .name-title {
            font-family: 'Syne', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0 0 16px 0;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #f8fafc, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bio-text {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            font-weight: 400;
            margin: 0 auto 2.5rem auto;
            max-width: 95%;
        }

        /* Baris Ikon Sosmed Lingkaran */
        .social-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 2.5rem;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            font-size: 1.2rem;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .social-btn:hover {
            transform: translateY(-5px);
        }
        .social-btn.email:hover { color: #ea4335; border-color: #ea4335; box-shadow: 0 10px 20px rgba(234, 67, 53, 0.2); }
        .social-btn.linkedin:hover { color: #0A66C2; border-color: #0A66C2; box-shadow: 0 10px 20px rgba(10, 102, 194, 0.2); }
        .social-btn.instagram:hover { color: #E1306C; border-color: #E1306C; box-shadow: 0 10px 20px rgba(225, 48, 108, 0.2); }

        /* Tautan Utama Bentuk Kartu */
        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 1.05rem;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .link-card i {
            font-size: 1.3rem;
            width: 24px;
            text-align: center;
            transition: 0.3s ease;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 4px;
            background: transparent;
            transition: 0.3s ease;
        }

        .link-card:hover {
            transform: translateY(-4px);
            border-color: #3a4a68;
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
            background: #161c28;
        }

        .link-card.github:hover::before { background: #ffffff; }
        .link-card.github:hover i { color: #ffffff; }
        
        .link-card.scholar:hover::before { background: #4285F4; }
        .link-card.scholar:hover i { color: #4285F4; }
        
        /* Tombol Spesial Aquaculture Research Ecosystem */
        .link-card.ecosystem {
            margin-top: 15px;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.05), rgba(168, 85, 247, 0.05));
            border-color: rgba(56, 189, 248, 0.4);
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            letter-spacing: 0.5px;
            justify-content: center;
        }
        
        .link-card.ecosystem:hover {
            border-color: var(--purple);
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.2);
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.1), rgba(168, 85, 247, 0.15));
        }

        .link-card.ecosystem i {
            color: var(--blue);
        }
        
        .link-card.ecosystem:hover i {
            color: var(--purple);
            transform: translateY(-2px) scale(1.1);
        }
        .link-card.ecosystem::before { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://i1.rgstatic.net/ii/profile.image/11431281895952982-1769604133704_Q128/Dandi-Setio-Wibowo.jpg" alt="Foto Profil Dandi Setio Wibowo" class="profile-img">
        
        <h1 class="name-title">Dandi Setio Wibowo</h1>

        <p class="bio-text">Peneliti akuakultur yang berfokus pada integrasi <strong>biologi molekuler</strong>, <strong>bioinformatika</strong>, dan inovasi bioteknologi untuk keberlanjutan perikanan.</p>

        <div class="social-row">
            <a href="mailto:dandiswibowo@gmail.com" class="social-btn email" target="_blank" title="Email Saya">
                <i class="fas fa-envelope"></i>
            </a>
            <a href="https://www.linkedin.com/in/dandi-setio-wibowo" class="social-btn linkedin" target="_blank" title="Koneksi LinkedIn">
                <i class="fab fa-linkedin-in"></i>
            </a>
            <a href="https://www.instagram.com/dandisetio_w" class="social-btn instagram" target="_blank" title="Ikuti Instagram">
                <i class="fab fa-instagram"></i>
            </a>
        </div>

        <div class="links">
            <a href="https://github.com/dandisw" class="link-card github" target="_blank">
                <i class="fab fa-github"></i> Profil GitHub
            </a>
            
            <a href="https://scholar.google.com/citations?user=SQh-fL0AAAAJ&hl=id" class="link-card scholar" target="_blank">
                <i class="fas fa-graduation-cap"></i> Publikasi Google Scholar
            </a>

            <a href="https://dandisw.github.io/Aquaculture-Research-Ecosystem/" class="link-card ecosystem" target="_blank">
                <i class="fas fa-rocket"></i> Aquaculture Research Ecosystem
            </a>
        </div>
    </div>

</body>
</html>
